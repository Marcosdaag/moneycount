<ion-header class="ion-no-border">
  <ion-toolbar color="light">
    <ion-title color="dark" class="main-title">Caja</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="goToDashboard()" color="primary" class="dashboard-btn">
        <ion-icon name="stats-chart" slot="start"></ion-icon>
        Resumen
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding" color="light">
  
  <!-- Transaction Type Toggle -->
  <div class="segment-wrapper ion-margin-bottom">
    <ion-segment [(ngModel)]="transactionType" mode="ios">
      <ion-segment-button value="ingreso" (click)="setTransactionType('ingreso')">
        <ion-label><strong>VENTA</strong></ion-label>
      </ion-segment-button>
      <ion-segment-button value="egreso" (click)="setTransactionType('egreso')">
        <ion-label><strong>COMPRA</strong></ion-label>
      </ion-segment-button>
    </ion-segment>
  </div>

  <!-- Amount Display -->
  <div class="amount-display ion-text-center">
    <p class="amount-label">MONTO INGRESADO</p>
    <h1 [class.text-success]="transactionType === 'ingreso'" [class.text-danger]="transactionType === 'egreso'">
      $ {{ amount | number:'1.0-0' }}
    </h1>
  </div>

  <!-- Keypad -->
  <div class="keypad ion-margin-top">
    <ion-row>
      <ion-col size="4"><button class="key-btn" (click)="appendNumber('1')">1</button></ion-col>
      <ion-col size="4"><button class="key-btn" (click)="appendNumber('2')">2</button></ion-col>
      <ion-col size="4"><button class="key-btn" (click)="appendNumber('3')">3</button></ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="4"><button class="key-btn" (click)="appendNumber('4')">4</button></ion-col>
      <ion-col size="4"><button class="key-btn" (click)="appendNumber('5')">5</button></ion-col>
      <ion-col size="4"><button class="key-btn" (click)="appendNumber('6')">6</button></ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="4"><button class="key-btn" (click)="appendNumber('7')">7</button></ion-col>
      <ion-col size="4"><button class="key-btn" (click)="appendNumber('8')">8</button></ion-col>
      <ion-col size="4"><button class="key-btn" (click)="appendNumber('9')">9</button></ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="4"><button class="key-btn action-btn text-danger" (click)="clearAmount()">C</button></ion-col>
      <ion-col size="4"><button class="key-btn" (click)="appendNumber('0')">0</button></ion-col>
      <ion-col size="4">
        <button class="key-btn action-btn text-medium" (click)="deleteNumber()">
          <ion-icon name="backspace-outline"></ion-icon>
        </button>
      </ion-col>
    </ion-row>
  </div>

  <!-- Payment Methods -->
  <div class="payment-methods ion-margin-top">
    <ion-row>
      <ion-col size="4">
        <button class="payment-btn btn-success" (click)="processPayment('efectivo')">
          <ion-icon name="cash-outline"></ion-icon>
          <span>Efectivo</span>
        </button>
      </ion-col>
      <ion-col size="4">
        <button class="payment-btn btn-tertiary" (click)="processPayment('tarjeta')">
          <ion-icon name="card-outline"></ion-icon>
          <span>Tarjeta</span>
        </button>
      </ion-col>
      <ion-col size="4">
        <button class="payment-btn btn-secondary" (click)="processPayment('transferencia')">
          <ion-icon name="phone-portrait-outline"></ion-icon>
          <span>Transf.</span>
        </button>
      </ion-col>
    </ion-row>
  </div>

</ion-content>
